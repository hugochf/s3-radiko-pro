# CI: build the ESP-IDF firmware on every push / PR. Pinned to the same IDF
# version used locally (v5.3.5) so "green on CI" means "green on my machine".
# The project lives in the idf/ subfolder of this repo.
name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Host-side unit tests (Phase 21): pure parsers, plain cc + Unity — fast
  # feedback in seconds, no toolchain container needed.
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run parser unit tests
        run: make -C test/host

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware (ESP-IDF v5.3.5, target esp32s3)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.5
          target: esp32s3
          path: idf

      - name: Upload firmware binary
        uses: actions/upload-artifact@v4
        with:
          name: esp32-radiko-player-pro-firmware
          path: |
            idf/build/esp32_radiko_player_pro.bin
            idf/build/bootloader/bootloader.bin
            idf/build/partition_table/partition-table.bin
          if-no-files-found: error
