# Release pipeline (Phase 23): pushing a tag `vX.Y.Z` produces a GitHub
# release whose firmware was built BY CI from THAT commit — artifact ==
# commit, always (the Phase 22 release was hand-built on a laptop; this
# closes that provenance gap). The OTA client consumes these releases.
#
# Guard rails:
#  - host unit tests must pass first
#  - the tag must match PROJECT_VER in idf/CMakeLists.txt (a mismatched
#    release would break the device-side version comparison)
#  - sha256 checksum published next to the binary (integrity; cryptographic
#    signing arrives with secure boot in Phase 25)
name: release

on:
  push:
    tags: ['v*']

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run parser unit tests
        run: make -C test/host

  release:
    needs: host-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release + upload assets
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches PROJECT_VER
        run: |
          ver=$(sed -n 's/^set(PROJECT_VER "\(.*\)")$/\1/p' idf/CMakeLists.txt)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$ver" != "$tag" ]; then
            echo "::error::PROJECT_VER ($ver) != tag ($tag) — bump idf/CMakeLists.txt before tagging"
            exit 1
          fi

      - name: Build firmware (ESP-IDF v5.3.5, target esp32s3)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.5
          target: esp32s3
          path: idf

      - name: Sign firmware (Phase 25 Stage A)
        # Every release binary carries an RSA-3072 signature block. Radios on
        # the default profile ignore it (fully backward compatible); radios on
        # the signed profile (sdkconfig.signed) verify it before installing.
        # The private key exists only as a GitHub secret + the offline backup.
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          pip install --quiet esptool==4.11.0   # pinned, matches local
          printf '%s\n' "$SIGNING_KEY" > "$RUNNER_TEMP/sk.pem"
          python -m espsecure sign_data --version 2 \
            --keyfile "$RUNNER_TEMP/sk.pem" \
            --output esp32_radiko_player_pro.bin \
            idf/build/esp32_radiko_player_pro.bin
          rm -f "$RUNNER_TEMP/sk.pem"
          python -m espsecure signature_info_v2 esp32_radiko_player_pro.bin

      - name: Checksum
        # Hash the SIGNED binary (the asset we ship), written to the
        # runner-owned workspace root (idf/build is root-owned via Docker).
        run: |
          sha256sum esp32_radiko_player_pro.bin | tee esp32_radiko_player_pro.bin.sha256

      - name: Create GitHub release
        # The ELF ships too (Phase 24 lesson): coredump decoding and JTAG
        # debugging of a fielded release need the EXACT matching symbol file.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            esp32_radiko_player_pro.bin \
            esp32_radiko_player_pro.bin.sha256 \
            idf/build/esp32_radiko_player_pro.elf \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
